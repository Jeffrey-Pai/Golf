name: Deploy Golf Guide to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Inject Firebase config from repository secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          python3 -c "
          import os, json
          cfg = {
              'apiKey':            os.environ.get('FIREBASE_API_KEY', ''),
              'authDomain':        os.environ.get('FIREBASE_AUTH_DOMAIN', ''),
              'projectId':         os.environ.get('FIREBASE_PROJECT_ID', ''),
              'storageBucket':     os.environ.get('FIREBASE_STORAGE_BUCKET', ''),
              'messagingSenderId': os.environ.get('FIREBASE_MESSAGING_SENDER_ID', ''),
              'appId':             os.environ.get('FIREBASE_APP_ID', ''),
          }
          marker = 'window.GOLF_FIREBASE_CONFIG'
          with open('golf-guide/javascripts/firebase-config.js') as f:
              content = f.read()
          if marker not in content:
              raise ValueError(f'Marker not found in firebase-config.js: {marker}')
          header = content.split(marker)[0]
          js = header + marker + ' = ' + json.dumps(cfg, indent=2) + ';\n'
          with open('golf-guide/javascripts/firebase-config.js', 'w') as f:
              f.write(js)
          "

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
